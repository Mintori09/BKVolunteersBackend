components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    q:
      name: q
      in: query
      schema:
        type: string
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    sortBy:
      name: sortBy
      in: query
      schema:
        type: string
    sortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
    fromDate:
      name: fromDate
      in: query
      schema:
        type: string
        format: date-time
    toDate:
      name: toDate
      in: query
      schema:
        type: string
        format: date-time
    status:
      name: status
      in: query
      schema:
        type: string
    campaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
    moduleId:
      name: moduleId
      in: path
      required: true
      schema:
        type: string
    organizerId:
      name: organizerId
      in: path
      required: true
      schema:
        type: string
    registrationId:
      name: registrationId
      in: path
      required: true
      schema:
        type: string
    contributionId:
      name: contributionId
      in: path
      required: true
      schema:
        type: string
    reviewRequestId:
      name: reviewRequestId
      in: path
      required: true
      schema:
        type: string
    commentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
    templateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
    policyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
    certificateId:
      name: certificateId
      in: path
      required: true
      schema:
        type: string
    publicId:
      name: publicId
      in: path
      required: true
      schema:
        type: string
    fileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
    notificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
    exportJobId:
      name: exportJobId
      in: path
      required: true
      schema:
        type: string
    clubId:
      name: clubId
      in: path
      required: true
      schema:
        type: string
    membershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: string
    accountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
    targetId:
      name: targetId
      in: path
      required: true
      schema:
        type: string

  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    Created:
      description: Created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: email | username | mssv
        password:
          type: string
          format: password

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

    StudentProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        className:
          type: string
        emergencyContact:
          type: string

    OrganizerProfileUpdate:
      type: object
      properties:
        name:
          type: string
        shortName:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        officeAddress:
          type: string

    CampaignCreateRequest:
      type: object
      required:
        - title
        - campaignStartAt
        - campaignEndAt
        - participationScopeType
      properties:
        title:
          type: string
        shortDescription:
          type: string
        overallObjective:
          type: string
        beneficiaryDescription:
          type: string
        campaignStartAt:
          type: string
          format: date-time
        campaignEndAt:
          type: string
          format: date-time
        participationScopeType:
          $ref: '#/components/schemas/ParticipationScope'
        coverFileId:
          type: string
        logoFileId:
          type: string
        facultyId:
          type: integer

    CampaignUpdateRequest:
      type: object
      additionalProperties: true

    ModuleCreateRequest:
      type: object
      required: [moduleType, title, moduleStartAt, moduleEndAt]
      properties:
        moduleType:
          $ref: '#/components/schemas/ModuleType'
        title:
          type: string
        description:
          type: string
        moduleStartAt:
          type: string
          format: date-time
        moduleEndAt:
          type: string
          format: date-time
        visibilityStatus:
          type: string
          enum: [INTERNAL, PUBLIC]
        participationScope:
          $ref: '#/components/schemas/ParticipationScope'

    ModuleUpdateRequest:
      type: object
      additionalProperties: true

    ItemTargetCreateRequest:
      type: object
      required: [itemName, unit, targetQuantity]
      properties:
        itemName:
          type: string
        unit:
          type: string
        targetQuantity:
          type: integer
        description:
          type: string
        priority:
          type: integer

    ItemContributionCreateRequest:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          items:
            type: object
            required: [itemTargetId, quantity]
            properties:
              itemTargetId:
                type: string
              quantity:
                type: integer
              note:
                type: string
        handoverTimeExpected:
          type: string
          format: date-time
        note:
          type: string

    ReviewCommentCreateRequest:
      type: object
      required: [scopeType, commentText]
      properties:
        scopeType:
          type: string
          enum: [CAMPAIGN, MODULE, DOCUMENT]
        moduleId:
          type: string
        documentId:
          type: string
        commentText:
          type: string

    CampaignCard:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        shortDescription:
          type: string
        status:
          type: string
        organizerType:
          $ref: '#/components/schemas/OrganizerType'
        moduleTypes:
          type: array
          items:
            $ref: '#/components/schemas/ModuleType'

    ModuleType:
      type: string
      enum:
        - VOLUNTEER_RECRUITMENT
        - FUNDRAISING_MONEY
        - ITEM_DONATION
        - EVENT

    OrganizerType:
      type: string
      enum: [CLB, LCD, DOANTRUONG]

    ParticipationScope:
      type: string
      enum: [FACULTY_INTERNAL, CLUB_INTERNAL, SCHOOL_WIDE]

    RegistrationStatus:
