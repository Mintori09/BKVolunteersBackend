openapi: 3.0.3
info:
  title: BK Volunteers API
  version: 2.0.0
  description: |
    OpenAPI 3.0 specification converted from API_SPEC (v2).
    Domain: thiện nguyện, công tác Đoàn, phong trào Thanh niên.
servers:
  - url: /api/v2
    description: API v2 base path
tags:
  - name: Auth
  - name: Me
  - name: PublicDiscovery
  - name: ActivityHub
  - name: Campaigns
  - name: Modules
  - name: Registrations
  - name: MoneyContributions
  - name: ItemContributions
  - name: Reviews
  - name: Certificates
  - name: Files
  - name: Notifications
  - name: Reports
  - name: Student
  - name: Organizer
  - name: Settings
  - name: Integrations
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Làm mới token
      security: []
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /auth/me:
    get:
      tags: [Auth]
      summary: Lấy identity hiện tại
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /users/me:
    patch:
      tags: [Me]
      summary: Cập nhật thông tin identity chung
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /students/me/profile:
    patch:
      tags: [Me, Student]
      summary: Cập nhật hồ sơ sinh viên
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentProfileUpdate'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /organizers/me/profile:
    patch:
      tags: [Me, Organizer]
      summary: Cập nhật hồ sơ đơn vị
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizerProfileUpdate'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /users/me/password:
    patch:
      tags: [Me]
      summary: Đổi mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /users/me/avatar:
    patch:
      tags: [Me]
      summary: Cập nhật avatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileId]
              properties:
                fileId:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/home:
    get:
      tags: [PublicDiscovery]
      summary: Dữ liệu trang chủ
      security: []
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/campaigns:
    get:
      tags: [PublicDiscovery]
      summary: Danh sách campaign công khai
      security: []
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/sortBy'
        - $ref: '#/components/parameters/sortOrder'
        - $ref: '#/components/parameters/fromDate'
        - $ref: '#/components/parameters/toDate'
        - $ref: '#/components/parameters/status'
        - name: moduleType
          in: query
          schema:
            $ref: '#/components/schemas/ModuleType'
        - name: organizerType
          in: query
          schema:
            $ref: '#/components/schemas/OrganizerType'
        - name: scope
          in: query
          schema:
            $ref: '#/components/schemas/ParticipationScope'
        - name: registrationOpen
          in: query
          schema:
            type: string
            enum: [OPEN_NOW, OPEN_SOON, CLOSED]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/CampaignCard'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'

  /public/campaigns/{campaignId}:
    get:
      tags: [PublicDiscovery]
      summary: Chi tiết campaign công khai
      security: []
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'

  /public/campaigns/{campaignId}/updates:
    get:
      tags: [PublicDiscovery]
      summary: Feed cập nhật campaign
      security: []
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/organizers/{organizerId}:
    get:
      tags: [PublicDiscovery]
      summary: Hồ sơ đơn vị công khai
      security: []
      parameters:
        - $ref: '#/components/parameters/organizerId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/organizers/{organizerId}/campaigns:
    get:
      tags: [PublicDiscovery]
      summary: Campaign công khai của đơn vị
      security: []
      parameters:
        - $ref: '#/components/parameters/organizerId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/activities:
    get:
      tags: [ActivityHub]
      summary: Dữ liệu trang Hoạt động chung (3 tab)
      security: []
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/fromDate'
        - $ref: '#/components/parameters/toDate'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/activities/fundraising:
    get:
      tags: [ActivityHub]
      summary: Danh sách module gây quỹ
      security: []
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/sortBy'
        - $ref: '#/components/parameters/sortOrder'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/activities/item-donation:
    get:
      tags: [ActivityHub]
      summary: Danh sách module hiện vật
      security: []
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/activities/volunteer:
    get:
      tags: [ActivityHub]
      summary: Danh sách module tuyển TNV
      security: []
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /public/modules/{moduleId}:
    get:
      tags: [ActivityHub]
      summary: Chi tiết public theo module
      security: []
      parameters:
        - $ref: '#/components/parameters/moduleId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns:
    post:
      tags: [Campaigns]
      summary: Tạo campaign container
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/Created'
    get:
      tags: [Campaigns]
      summary: Danh sách campaign theo quyền
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/fromDate'
        - $ref: '#/components/parameters/toDate'
        - $ref: '#/components/parameters/status'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}:
    get:
      tags: [Campaigns]
      summary: Chi tiết campaign
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    patch:
      tags: [Campaigns]
      summary: Cập nhật campaign
      parameters:
        - $ref: '#/components/parameters/campaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    delete:
      tags: [Campaigns]
      summary: Xóa mềm campaign draft
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}/preview:
    get:
      tags: [Campaigns]
      summary: Preview campaign page
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}/actions/{action}:
    post:
      tags: [Campaigns]
      summary: Workflow action của campaign
      parameters:
        - $ref: '#/components/parameters/campaignId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - ready-for-review
              - submit-review
              - publish
              - start
              - pause
              - resume
              - end
              - archive
              - cancel
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '409':
          $ref: '#/components/responses/Conflict'

  /campaigns/{campaignId}/status-history:
    get:
      tags: [Campaigns]
      summary: Lịch sử trạng thái campaign
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}/modules:
    post:
      tags: [Modules]
      summary: Tạo module trong campaign
      parameters:
        - $ref: '#/components/parameters/campaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/Created'
    get:
      tags: [Modules]
      summary: Danh sách modules theo campaign
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}/modules/{moduleId}:
    get:
      tags: [Modules]
      summary: Chi tiết module
      parameters:
        - $ref: '#/components/parameters/campaignId'
        - $ref: '#/components/parameters/moduleId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    patch:
      tags: [Modules]
      summary: Cập nhật module
      parameters:
        - $ref: '#/components/parameters/campaignId'
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    delete:
      tags: [Modules]
      summary: Xóa module
      parameters:
        - $ref: '#/components/parameters/campaignId'
        - $ref: '#/components/parameters/moduleId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}/modules/{moduleId}/actions/{action}:
    post:
      tags: [Modules]
      summary: Workflow action của module
      parameters:
        - $ref: '#/components/parameters/campaignId'
        - $ref: '#/components/parameters/moduleId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [activate, pause, end, cancel]
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /modules/{moduleId}/config:
    get:
      tags: [Modules]
      summary: Lấy cấu hình module theo moduleType
      parameters:
        - $ref: '#/components/parameters/moduleId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    put:
      tags: [Modules]
      summary: Cập nhật cấu hình module theo moduleType
      parameters:
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /modules/{moduleId}/item-targets:
    post:
      tags: [Modules, ItemContributions]
      summary: Tạo target hiện vật
      parameters:
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemTargetCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/Created'
    get:
      tags: [Modules, ItemContributions]
      summary: Danh sách target hiện vật
      security: []
      parameters:
        - $ref: '#/components/parameters/moduleId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /modules/{moduleId}/item-targets/{targetId}:
    patch:
      tags: [Modules, ItemContributions]
      summary: Cập nhật target hiện vật
      parameters:
        - $ref: '#/components/parameters/moduleId'
        - $ref: '#/components/parameters/targetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    delete:
      tags: [Modules, ItemContributions]
      summary: Xóa target hiện vật
      parameters:
        - $ref: '#/components/parameters/moduleId'
        - $ref: '#/components/parameters/targetId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /modules/{moduleId}/registrations:
    post:
      tags: [Registrations]
      summary: Sinh viên đăng ký tham gia module
      parameters:
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                answers:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          $ref: '#/components/responses/Created'
    get:
      tags: [Registrations]
      summary: Danh sách đăng ký theo module
      parameters:
        - $ref: '#/components/parameters/moduleId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RegistrationStatus'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /registrations/{registrationId}:
    get:
      tags: [Registrations]
      summary: Chi tiết đăng ký
      parameters:
        - $ref: '#/components/parameters/registrationId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /registrations/{registrationId}/actions/{action}:
    post:
      tags: [Registrations]
      summary: Workflow action cho registration
      parameters:
        - $ref: '#/components/parameters/registrationId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [approve, waitlist, reject, cancel, checkin, mark-no-show]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /registrations/bulk-actions:
    post:
      tags: [Registrations]
      summary: Xử lý đăng ký hàng loạt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, registrationIds]
              properties:
                action:
                  type: string
                  enum: [approve, waitlist, reject, checkin]
                registrationIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /modules/{moduleId}/money-contributions/checkout:
    post:
      tags: [MoneyContributions]
      summary: Tạo payment order/link realtime
      parameters:
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                note:
                  type: string
                returnUrl:
                  type: string
                  format: uri
                cancelUrl:
                  type: string
                  format: uri
      responses:
        '201':
          $ref: '#/components/responses/Created'

  /modules/{moduleId}/money-contributions:
    get:
      tags: [MoneyContributions]
      summary: Danh sách money contributions theo module
      parameters:
        - $ref: '#/components/parameters/moduleId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /modules/{moduleId}/money-contributions/manual:
    post:
      tags: [MoneyContributions]
      summary: Khai báo chuyển khoản thủ công
      parameters:
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                note:
                  type: string
                proofFileId:
                  type: string
      responses:
        '201':
          $ref: '#/components/responses/Created'

  /money-contributions/{contributionId}:
    get:
      tags: [MoneyContributions]
      summary: Chi tiết money contribution
      parameters:
        - $ref: '#/components/parameters/contributionId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /money-contributions/{contributionId}/actions/{action}:
    post:
      tags: [MoneyContributions]
      summary: Xử lý money contribution thủ công
      parameters:
        - $ref: '#/components/parameters/contributionId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [verify, reject]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                verifiedAmount:
                  type: number
                reason:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /integrations/payments/webhook:
    post:
      tags: [Integrations, MoneyContributions]
      summary: Webhook payment provider realtime
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /modules/{moduleId}/item-contributions:
    post:
      tags: [ItemContributions]
      summary: Đăng ký quyên góp hiện vật
      parameters:
        - $ref: '#/components/parameters/moduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemContributionCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/Created'
    get:
      tags: [ItemContributions]
      summary: Danh sách item contributions theo module
      parameters:
        - $ref: '#/components/parameters/moduleId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /item-contributions/{contributionId}:
    get:
      tags: [ItemContributions]
      summary: Chi tiết item contribution
      parameters:
        - $ref: '#/components/parameters/contributionId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /item-contributions/{contributionId}/actions/{action}:
    post:
      tags: [ItemContributions]
      summary: Xử lý item contribution
      parameters:
        - $ref: '#/components/parameters/contributionId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [confirm-handover, reject]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                handoverMethod:
                  type: string
                  enum: [MANUAL_CONFIRM, QR_CHECKIN, SIGNATURE]
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /campaigns/{campaignId}/review-requests:
    post:
      tags: [Reviews]
      summary: Tạo review request
      parameters:
        - $ref: '#/components/parameters/campaignId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          $ref: '#/components/responses/Created'

  /review-requests:
    get:
      tags: [Reviews]
      summary: Danh sách review requests
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /review-requests/{reviewRequestId}:
    get:
      tags: [Reviews]
      summary: Chi tiết review request
      parameters:
        - $ref: '#/components/parameters/reviewRequestId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /review-requests/{reviewRequestId}/comments:
    post:
      tags: [Reviews]
      summary: Tạo comment review
      parameters:
        - $ref: '#/components/parameters/reviewRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCommentCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/Created'

  /review-comments/{commentId}:
    patch:
      tags: [Reviews]
      summary: Cập nhật review comment
      parameters:
        - $ref: '#/components/parameters/commentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [commentText]
              properties:
                commentText:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    delete:
      tags: [Reviews]
      summary: Xóa review comment
      parameters:
        - $ref: '#/components/parameters/commentId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /review-requests/{reviewRequestId}/actions/{action}:
    post:
      tags: [Reviews]
      summary: Workflow action review
      parameters:
        - $ref: '#/components/parameters/reviewRequestId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [pre-approve, final-approve, request-revision, reject]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        '200':
