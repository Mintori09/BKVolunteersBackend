services:
  app:
    build: .
    container_name: bk-volunteers-backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=mariadb://root:password@db:3306/bk_volunteers
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: bk-volunteers-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: bk_volunteers
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      timeout: 20s
      retries: 10

volumes:
  mariadb_data:
